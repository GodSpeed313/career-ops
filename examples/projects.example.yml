# Settings
display_settings:
  # Which projects to show on the public CV
  public_projects:
    - worldcraft
    - career-ops
  
  # Projects to include in private Portfolio view
  all_projects:
    - teplit
    - worldcraft
    - melody
    - career-ops
  
  # Sections to include in LaTeX output
  latex_sections:
    - project_gallery
    - toolbox
    - key_achievements_summary
